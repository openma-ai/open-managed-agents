packages:
  - 'packages/*'
  - 'apps/main'
  - 'apps/main-node'
  - 'apps/oma-vault'
  - 'apps/agent'
  - 'apps/console'
  - 'apps/integrations'
  - 'apps/docs'
  - 'apps/web'

# pnpm v11 reads ALL pnpm config from this file — `pnpm` block in
# package.json is no longer honored. Keep peerDependencyRules + the
# build allowlist here.
peerDependencyRules:
  allowAny:
    - zod

# Keep dependency installs reproducible even when a developer has a
# user-level mirror configured; some mirrors intermittently fail tarball
# downloads for transitive console dependencies.
registry: https://registry.npmjs.org/

# v11 renamed `onlyBuiltDependencies` (array) → `allowBuilds` (map).
# Without these entries pnpm v11 hard-fails install (strictDepBuilds=true
# by default) with ERR_PNPM_IGNORED_BUILDS.
allowBuilds:
  '@anthropic-ai/tokenizer': true
  better-sqlite3: true
  esbuild: true
  msw: false
  protobufjs: true
  sharp: true
  workerd: true
